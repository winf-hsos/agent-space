<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Agent Manager{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .tab-active { border-bottom: 2px solid #6366f1; color: #a5b4fc; }
    .tab-inactive { border-bottom: 2px solid transparent; color: #94a3b8; }
    .tab-inactive:hover { color: #e2e8f0; border-color: #475569; }
    .scrollbar-thin::-webkit-scrollbar { width: 4px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    textarea { resize: vertical; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 h-full flex">

  <!-- Sidebar -->
  <aside class="w-56 shrink-0 bg-slate-900 border-r border-slate-800 flex flex-col h-screen sticky top-0">
    <!-- Logo -->
    <div class="px-4 pt-5 pb-4 border-b border-slate-800">
      <a href="/" class="flex items-center gap-2.5">
        <span class="text-xl leading-none">⚡</span>
        <span class="font-semibold text-slate-100 tracking-tight">Agent Space</span>
      </a>
      <!-- Bridge status -->
      <div class="mt-3 flex items-center gap-2">
        <span id="sb-dot" class="inline-block w-2 h-2 rounded-full bg-slate-600"></span>
        <span id="sb-label" class="text-xs text-slate-500">Checking...</span>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 px-2 py-3 space-y-0.5 overflow-y-auto">
      <a href="/"
         class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm font-medium transition-colors
                {% if request.url.path == '/' %}bg-slate-800 text-slate-100{% else %}text-slate-400 hover:bg-slate-800 hover:text-slate-100{% endif %}">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
        </svg>
        Dashboard
      </a>
      <a href="/tools"
         class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm font-medium transition-colors
                {% if request.url.path.startswith('/tools') %}bg-slate-800 text-slate-100{% else %}text-slate-400 hover:bg-slate-800 hover:text-slate-100{% endif %}">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        Tools
      </a>
      <a href="/shared-instructions"
         class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm font-medium transition-colors
                {% if request.url.path == '/shared-instructions' %}bg-slate-800 text-slate-100{% else %}text-slate-400 hover:bg-slate-800 hover:text-slate-100{% endif %}">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        Shared Instructions
      </a>
      <a href="/settings"
         class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm font-medium transition-colors
                {% if request.url.path == '/settings' %}bg-slate-800 text-slate-100{% else %}text-slate-400 hover:bg-slate-800 hover:text-slate-100{% endif %}">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        Settings
      </a>
    </nav>

    <!-- Bridge control -->
    <div class="px-3 py-3 border-t border-slate-800 space-y-2">
      <button id="sb-btn" onclick="toggleBridge()"
              class="w-full text-xs px-3 py-2 rounded-lg font-medium transition-colors bg-slate-800 text-slate-400 cursor-wait">
        …
      </button>
      <button id="sb-restart" onclick="restartBridge()" style="display:none"
              class="w-full text-xs px-3 py-2 rounded-lg font-medium transition-colors bg-slate-800 text-amber-400 hover:bg-amber-950">
        Restart Bridge
      </button>
      <p class="text-center text-xs text-slate-600">port 7860</p>
    </div>
  </aside>

  <!-- Content -->
  <main class="flex-1 overflow-auto min-h-screen">
    <div class="max-w-6xl mx-auto px-6 py-8">
      {% block content %}{% endblock %}
    </div>
  </main>

  <script>
    let _running = false;

    async function fetchStatus() {
      try {
        const r = await fetch('/api/bridge/status');
        const d = await r.json();
        _running = d.running;
        const dot   = document.getElementById('sb-dot');
        const label = document.getElementById('sb-label');
        const btn   = document.getElementById('sb-btn');
        const restart = document.getElementById('sb-restart');
        if (d.running) {
          dot.className   = 'inline-block w-2 h-2 rounded-full bg-green-400 animate-pulse';
          label.textContent = 'Running · PID ' + d.pid;
          label.className = 'text-xs text-green-400';
          btn.textContent = 'Stop Bridge';
          btn.className   = 'w-full text-xs px-3 py-2 rounded-lg font-medium transition-colors bg-red-950 text-red-300 hover:bg-red-900';
          restart.style.display = '';
        } else {
          dot.className   = 'inline-block w-2 h-2 rounded-full bg-slate-600';
          label.textContent = 'Bridge stopped';
          label.className = 'text-xs text-slate-500';
          btn.textContent = 'Start Bridge';
          btn.className   = 'w-full text-xs px-3 py-2 rounded-lg font-medium transition-colors bg-green-950 text-green-300 hover:bg-green-900';
          restart.style.display = 'none';
        }
      } catch(e) {
        document.getElementById('sb-label').textContent = 'Unavailable';
      }
    }

    async function toggleBridge() {
      const btn = document.getElementById('sb-btn');
      btn.disabled = true;
      btn.textContent = '…';
      await fetch('/api/bridge/' + (_running ? 'stop' : 'start'), { method: 'POST' });
      await new Promise(r => setTimeout(r, 600));
      await fetchStatus();
      btn.disabled = false;
    }

    async function restartBridge() {
      const btn = document.getElementById('sb-restart');
      btn.disabled = true;
      btn.textContent = 'Restarting…';
      await fetch('/api/bridge/restart', { method: 'POST' });
      await new Promise(r => setTimeout(r, 1200));
      await fetchStatus();
      btn.disabled = false;
      btn.textContent = 'Restart Bridge';
    }

    fetchStatus();
    setInterval(fetchStatus, 12000);
    {% block scripts %}{% endblock %}
  </script>
</body>
</html>
